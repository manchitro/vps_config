# --- PLUGINS ---
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'dreamsofcode-io/catppuccin-tmux'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'tmux-plugins/tmux-resurrect'   # save/restore sessions manually (prefix + Ctrl-s / Ctrl-r)
set -g @plugin 'tmux-plugins/tmux-continuum'   # auto-save every 15 min + restore on server start
set -g @continuum-restore 'on'

# --- GENERAL SETTINGS ---
set -g default-shell "/opt/homebrew/bin/fish"

# Change prefix to Option-a
unbind C-b
set -g prefix C-a
bind C-a send-prefix

set -g mouse on
set -s extended-keys on

# Start windows and panes at 1, not 0
set -g base-index 1
set-window-option -g pane-base-index 1
set -g pane-base-index 1
set-option -g renumber-windows on

set -g @scroll-speed-num-lines-per-scroll 1

# --- KEY BINDINGS ---
# Use vi-style key bindings in copy mode
set-window-option -g mode-keys vi
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel
bind-key -T copy-mode-vi C-q send-keys -X rectangle-toggle

# --- VIM-LIKE PANE MANAGEMENT (NO PREFIX) ---

# Kill pane with Option-x
bind -n M-x kill-pane

# Navigate panes with Option + hjkl
bind -n M-h select-pane -L
bind -n M-j select-pane -D
bind -n M-k select-pane -U
bind -n M-l select-pane -R

# Resize panes with Ctrl+Shift+hjkl
bind -n M-C-H resize-pane -L 5
bind -n M-C-J resize-pane -D 5
bind -n M-C-K resize-pane -U 5
bind -n M-C-L resize-pane -R 5

# Split panes with Option + Shift + j/l
# NOTE: tmux 3.6 changed Meta+Shift notation — M-S-J replaces M-J
bind -n M-S-J split-window -v -c "#{pane_current_path}"
bind -n M-S-L split-window -h -c "#{pane_current_path}"

# Move current pane to new window
bind -n M-b break-pane

# Navigate windows
bind -n M-n next-window
bind -n M-p previous-window
bind -n M-F run-shell "tmux list-windows -a | fzf | cut -d: -f1 | xargs tmux select-window -t"

# Pane features
bind -n M-\` last-pane
bind-key -n M-z resize-pane -Z

# Window features
bind -n M-r command-prompt -I "#W" "rename-window '%%'"

# Power user
set -g history-limit 50000
set -g status-interval 5
bind -n M-c command-prompt

# Fix icons for status bar (use ASCII symbols instead of unicode)
set -g @catppuccin_window_left_separator " "
set -g @catppuccin_window_right_separator " "
set -g @catppuccin_window_middle_separator " | "
set -g @catppuccin_window_number_position "left"
set -g @catppuccin_window_tabs_enabled on
set -g @catppuccin_window_status_enable "yes"
set -g @catppuccin_window_status_icon " "


# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.config/tmux/plugins/tpm/tpm'
